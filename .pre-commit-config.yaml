default_language_version:
  python: python3.12

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
      - id: check-json
        name: Check JSON
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-docstring-first
        name: Check docstring is first
      - id: debug-statements
        name: Check for debug statements
      - id: detect-private-key
        name: Detect private key
      - id: mixed-line-ending
        name: Fix mixed line endings

  # Ruff linting and formatting (fast, modern replacement for flake8/pylint/black/isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        name: Ruff lint
        args: [--fix]
        stages: [commit]
      - id: ruff-format
        name: Ruff format
        stages: [commit]

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        name: MyPy type check
        additional_dependencies:
          - types-setuptools
          - types-requests
        args: [--ignore-missing-imports, --warn-unused-ignores]
        stages: [commit]

  # Security scanning with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Bandit security scan
        args: [-c, pyproject.toml]
        stages: [commit]

  # Docstring formatting (pydocstyle)
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: Check docstring style
        exclude: "tests/|__pycache__"
        stages: [commit]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from ruff, black, isort, and trailing-whitespace hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [mypy, bandit]  # These can be slow; run in CI/CD only
  submodules: false
